<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="description" content="Scanner Interface for Antbox Digital ID">
  <title>Antbox Scanner</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap');

:root {
  --bg:       #08080f;
  --surface:  #111119;
  --surface2: #1a1a24;
  --border:   rgba(255,255,255,0.07);
  --primary:  #7B61FF;
  --secondary:#2DD4BF;
  --amber:    #FBBF24;
  --red:      #F87171;
  --text:     #EEEEFF;
  --muted:    #6B6B8A;
  --heading:  'Syne', sans-serif;
  --mono:     'DM Mono', monospace;
  --spring:   cubic-bezier(0.34,1.56,0.64,1);
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  background:var(--bg);color:var(--text);
  font-family:var(--heading);min-height:100vh;
  overflow-x:hidden;display:flex;flex-direction:column;
}

/* ── Top Bar ── */
.top-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:0.9rem 1.2rem;z-index:10;flex-shrink:0;
  border-bottom:1px solid var(--border);gap:0.5rem;flex-wrap:wrap;
}
.app-brand{font-weight:800;font-size:1.1rem;white-space:nowrap;}
.clock-display{
  font-family:var(--mono);font-size:0.75rem;color:var(--muted);
  display:none;text-align:center;flex:1;
}
@media(min-width:480px){.clock-display{display:block;}}
.status-indicator{
  display:flex;align-items:center;gap:0.4rem;
  font-size:0.8rem;font-weight:700;white-space:nowrap;
}
.status-dot{
  width:9px;height:9px;background:var(--secondary);
  border-radius:50%;animation:pulseDot 2s infinite;flex-shrink:0;
}

/* ── Main Layout ── */
.scanner-wrap{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:1rem;gap:1rem;position:relative;
}

/* ── Viewfinder ── */
.viewfinder-box{
  width:min(75vw,300px);aspect-ratio:1/1;position:relative;
  background-image:
    linear-gradient(var(--border) 1px,transparent 1px),
    linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:20px 20px;overflow:hidden;border-radius:4px;
  flex-shrink:0;
}

/* hide html5-qrcode injected UI noise */
.viewfinder-box > img,
.viewfinder-box > div[style]{display:none!important;}
.viewfinder-box video{
  width:100%!important;height:100%!important;
  object-fit:cover!important;border-radius:0!important;
}

.bracket{
  position:absolute;width:36px;height:36px;
  border-color:var(--primary);border-style:solid;
  animation:pulseBracket 2s infinite alternate;
}
.bracket.tl{top:0;left:0;border-width:4px 0 0 4px;border-top-left-radius:10px;}
.bracket.tr{top:0;right:0;border-width:4px 4px 0 0;border-top-right-radius:10px;}
.bracket.bl{bottom:0;left:0;border-width:0 0 4px 4px;border-bottom-left-radius:10px;}
.bracket.br{bottom:0;right:0;border-width:0 4px 4px 0;border-bottom-right-radius:10px;}

.scan-line{
  position:absolute;top:0;left:0;width:100%;height:2px;
  background:var(--primary);box-shadow:0 0 10px var(--primary);
  animation:sweep 2s linear infinite;display:none;
}
.scanning .scan-line{display:block;}

.hint-text{
  color:var(--muted);font-size:0.85rem;text-align:center;
}

/* ── Scan Button ── */
.scan-btn{
  display:flex;align-items:center;justify-content:center;gap:0.6rem;
  width:min(280px,80vw);padding:0.85rem 1.5rem;
  background:var(--primary);color:#fff;border:none;
  border-radius:12px;font-family:var(--heading);
  font-size:1rem;font-weight:700;cursor:pointer;
  transition:all 0.2s ease;position:relative;
}
.scan-btn:hover:not(:disabled){box-shadow:0 0 20px rgba(123,97,255,0.45);}
.scan-btn:active:not(:disabled){transform:scale(0.97);}
.scan-btn:disabled{opacity:0.55;cursor:not-allowed;}
.scan-btn.active{background:#3d3560;}
.scan-btn .btn-icon{font-size:1.1rem;}

/* ── Result Card ── */
.result-card{
  width:min(360px,90vw);background:var(--surface);
  border:1px solid var(--border);padding:1.2rem;
  border-radius:14px;transform:translateY(30px);
  opacity:0;transition:all 0.45s var(--spring);
  pointer-events:none;
}
.result-card.show{transform:translateY(0);opacity:1;pointer-events:auto;}
.result-card.status-in    {background:rgba(45,212,191,0.08);border-color:var(--secondary);}
.result-card.status-out   {background:rgba(251,191,36,0.08); border-color:var(--amber);}
.result-card.status-invalid{background:rgba(248,113,113,0.08);border-color:var(--red);}

.res-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.5rem;}
.res-name{font-size:1.2rem;font-weight:700;margin-bottom:0.15rem;}
.res-role{color:var(--muted);font-size:0.82rem;}
.res-meta{margin-top:0.8rem;padding-top:0.8rem;border-top:1px solid var(--border);}
.res-id  {font-family:var(--mono);color:var(--primary);font-size:0.85rem;margin-bottom:0.25rem;}
.res-time{font-family:var(--mono);color:var(--muted);font-size:0.78rem;}

.badge{padding:0.2rem 0.6rem;border-radius:12px;font-weight:800;font-size:0.78rem;white-space:nowrap;}
.badge.in     {background:rgba(45,212,191,0.2);color:var(--secondary);}
.badge.out    {background:rgba(251,191,36,0.2); color:var(--amber);}
.badge.invalid{background:rgba(248,113,113,0.2);color:var(--red);}
.badge.duplicate{background:rgba(251,191,36,0.2);color:var(--amber);}

/* ── Logs Strip ── */
.logs-strip{
  flex-shrink:0;min-height:58px;max-height:70px;
  background:var(--surface2);border-top:1px solid var(--border);
  display:flex;align-items:center;padding:0 1rem;
  gap:0.75rem;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;
  width:100%;
}
.logs-strip::-webkit-scrollbar{display:none;}
.log-pill{
  background:var(--surface);border:1px solid var(--border);
  padding:0.4rem 0.8rem;border-radius:20px;
  display:flex;align-items:center;gap:0.4rem;
  white-space:nowrap;font-size:0.82rem;flex-shrink:0;
}

/* ── Toast ── */
.toast{
  position:fixed;top:16px;left:50%;
  transform:translateX(-50%) translateY(-24px);
  padding:0.75rem 1.25rem;border-radius:10px;color:#fff;
  font-family:var(--heading);font-weight:700;font-size:0.9rem;
  opacity:0;transition:all 0.3s ease;z-index:2000;
  pointer-events:none;max-width:90vw;text-align:center;
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.success{background:var(--secondary);color:#000;}
.toast.warning{background:var(--amber);color:#000;}
.toast.error  {background:var(--red);color:#fff;}
.toast.info   {background:var(--primary);color:#fff;}

/* ── Overlays ── */
#loadingOverlay,#cameraErrorState{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;z-index:100;gap:1rem;text-align:center;padding:2rem;
}
#loadingOverlay.hidden,#cameraErrorState.hidden{display:none!important;}

.spinner{
  width:38px;height:38px;border:3px solid var(--border);
  border-top-color:var(--primary);border-radius:50%;
  animation:spin 0.8s linear infinite;
}
.btn-retry{
  margin-top:0.5rem;padding:0.75rem 2rem;
  background:var(--primary);color:#fff;border:none;
  border-radius:10px;font-family:var(--heading);
  font-size:1rem;font-weight:700;cursor:pointer;
}
.err-icon{
  width:56px;height:56px;border:2px solid var(--red);border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  color:var(--red);font-size:2rem;font-weight:700;
}

/* ── Admin link ── */
.admin-link{
  position:fixed;top:0.6rem;right:0.8rem;z-index:200;
  color:var(--muted);font-size:0.75rem;text-decoration:none;opacity:0.45;
}

/* ── Back link ── */
.back-link{
  color:var(--muted);font-size:0.8rem;text-decoration:none;
  display:inline-flex;align-items:center;gap:0.3rem;
}
.back-link:hover{color:var(--text);}

/* ── Keyframes ── */
@keyframes spin        {to{transform:rotate(360deg);}}
@keyframes pulseDot    {0%{box-shadow:0 0 0 0 rgba(45,212,191,0.7)}70%{box-shadow:0 0 0 8px rgba(45,212,191,0)}100%{box-shadow:0 0 0 0 rgba(45,212,191,0)}}
@keyframes pulseBracket{from{opacity:0.55}to{opacity:1}}
@keyframes sweep       {0%{top:0%;opacity:0}10%{opacity:1}90%{opacity:1}100%{top:100%;opacity:0}}
  </style>
</head>
<body>

<a class="admin-link"
   href="https://script.google.com/macros/s/AKfycbxkQXq5BDQ3xsCiPHQxSHfRtG2Vz0lJ3U8RFkAwtCWgMIqZnpVgmeb6dSs2UwrsUuii7w/exec?action=admin"
   target="_blank">Admin ↗</a>

<!-- Loading overlay -->
<div id="loadingOverlay">
  <div class="spinner"></div>
  <p style="color:var(--muted);font-size:0.9rem;">Initialising scanner…</p>
</div>

<!-- Camera permission error -->
<div id="cameraErrorState" class="hidden">
  <div class="err-icon">!</div>
  <h2 style="margin-bottom:0.5rem;">Camera Access Required</h2>
  <p style="color:var(--muted);margin-bottom:1.5rem;">Allow camera permissions to use the scanner.</p>
  <button class="btn-retry" onclick="location.reload()">Retry</button>
</div>

<!-- Top Bar -->
<div class="top-bar">
  <div class="app-brand">Antbox<span style="color:var(--primary);">ID</span></div>
  <div class="clock-display mono" id="liveClock">--</div>
  <div class="status-indicator">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Ready</span>
  </div>
</div>

<!-- Main Scanner Area -->
<div class="scanner-wrap" id="scannerWrap">

  <!-- Viewfinder -->
  <div class="viewfinder-box" id="viewfinder-container">
    <div class="bracket tl"></div>
    <div class="bracket tr"></div>
    <div class="bracket bl"></div>
    <div class="bracket br"></div>
    <div class="scan-line"></div>
  </div>

  <p class="hint-text" id="hintText">Press <strong>Start Scan</strong> to activate the camera</p>

  <!-- Scan Button -->
  <button class="scan-btn" id="scanBtn" onclick="toggleScan()">
    <span class="btn-icon">⬡</span>
    <span id="scanBtnLabel">Start Scan</span>
  </button>

  <!-- Result Card (in-flow, not absolute) -->
  <div class="result-card" id="resultCard">
    <div class="res-row">
      <div>
        <div class="res-name" id="resName">--</div>
        <div class="res-role" id="resRole">--</div>
      </div>
      <span class="badge" id="resStatusBadge">--</span>
    </div>
    <div class="res-meta">
      <div class="res-id"   id="resId">--</div>
      <div class="res-time" id="resTime">--</div>
    </div>
  </div>

  <a class="back-link" href="https://script.google.com/macros/s/AKfycbxkQXq5BDQ3xsCiPHQxSHfRtG2Vz0lJ3U8RFkAwtCWgMIqZnpVgmeb6dSs2UwrsUuii7w/exec">
    ← Back to Register
  </a>

</div>

<!-- Logs Strip -->
<div class="logs-strip" id="logsStrip">
  <span style="color:var(--muted);font-size:0.8rem;flex-shrink:0;">Recent scans will appear here</span>
</div>

<!-- Toast -->
<div class="toast" id="toastBox"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxkQXq5BDQ3xsCiPHQxSHfRtG2Vz0lJ3U8RFkAwtCWgMIqZnpVgmeb6dSs2UwrsUuii7w/exec';

/* ── State ── */
let scanner        = null;
let isScanning     = false;
let scanCooldown   = false;
let noQrTimer      = null;
let hideCardTimer  = null;

/* ── Clock ── */
(function tickClock(){
  const el = document.getElementById('liveClock');
  const now = new Date();
  el.textContent =
    now.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'})
    + ' · ' + now.toTimeString().slice(0,8);
  setTimeout(tickClock, 1000);
})();

/* ── Toast ── */
const toastEl = document.getElementById('toastBox');
let toastTimer;
function showToast(msg, type) {
  clearTimeout(toastTimer);
  toastEl.textContent = msg;
  toastEl.className   = 'toast show ' + (type || 'info');
  toastTimer = setTimeout(()=> toastEl.classList.remove('show'), 3000);
}

/* ── Result Card ── */
const resultCard = document.getElementById('resultCard');
function showResultCard(status, data) {
  const s = status.toLowerCase();
  document.getElementById('resName').textContent = data.name    || (status === 'INVALID' ? (data.message || 'Error') : 'Unknown');
  document.getElementById('resRole').textContent = data.role    || (status === 'INVALID' ? '' : 'N/A');
  document.getElementById('resId').textContent   = data.userId  || '';
  const ts = data.timestamp || data.scannedAt;
  document.getElementById('resTime').textContent = ts ? new Date(ts).toLocaleTimeString() : '--';
  const badge = document.getElementById('resStatusBadge');
  badge.textContent = status;
  badge.className   = 'badge ' + s;
  resultCard.className = 'result-card status-' + s + ' show';
  clearTimeout(hideCardTimer);
  hideCardTimer = setTimeout(()=>{
    resultCard.classList.remove('show');
    resultCard.className = 'result-card';
  }, 4000);
}

/* ── JSONP ── */
function jsonp(url, cb) {
  const name = 'jcb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
  const s    = document.createElement('script');
  let done   = false;

  window[name] = function(data){
    if(done) return; done = true;
    clearTimeout(t); s.remove(); delete window[name];
    cb(null, data);
  };
  const t = setTimeout(()=>{
    if(done) return; done = true;
    s.remove(); delete window[name];
    cb(new Error('timeout'));
  }, 9000);
  s.onerror = ()=>{
    if(done) return; done = true;
    clearTimeout(t); s.remove(); delete window[name];
    cb(new Error('load error'));
  };
  s.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + name;
  document.head.appendChild(s);
}

/* ── QR Decode ── */
function decodeQR(raw) {
  try {
    const p = JSON.parse(raw);
    if (!p.userId) return { valid:false, reason:'Missing userId in QR' };
    return { valid:true, payload:p };
  } catch(e) {
    return { valid:false, reason:'QR data is not valid JSON' };
  }
}

/* ── On Scan Success ── */
function onScanSuccess(raw) {
  if (scanCooldown) return;

  // Reset the "no QR" timer each time something is detected
  resetNoQrTimer();

  const decoded = decodeQR(raw);
  if (!decoded.valid) {
    showToast('❌ ' + decoded.reason, 'error');
    return;
  }

  scanCooldown = true;
  showToast('QR detected — sending…', 'info');

  const p = decoded.payload;
  const url = API_URL
    + '?action=scan'
    + '&userId=' + encodeURIComponent(p.userId)
    + '&name='   + encodeURIComponent(p.name   || '')
    + '&role='   + encodeURIComponent(p.role   || '')
    + '&issued=' + encodeURIComponent(p.issued || '');

  jsonp(url, function(err, data){
    if (err) {
      showToast('⚠️ Server error — check connection', 'error');
      showResultCard('INVALID', { message:'Server Error' });
      scanCooldown = false;
      return;
    }

    const st = (data.status || '').toUpperCase();

    if (st === 'DUPLICATE') {
      showToast('⚠️ Already logged — duplicate scan', 'warning');
      setTimeout(()=>{ scanCooldown = false; }, 2500);

    } else if (st === 'INVALID') {
      showToast('❌ ' + (data.message || 'Invalid QR'), 'error');
      showResultCard('INVALID', { message: data.message });
      scanCooldown = false;

    } else {
      const time = new Date(data.scannedAt || Date.now()).toLocaleTimeString();
      showToast('✅ ' + st + ' logged at ' + time, 'success');
      showResultCard(st, data);
      prependLog(data);
      scanCooldown = false;
    }
  });
}

function onScanError() { /* suppress library noise */ }

/* ── No-QR Timer ── */
function resetNoQrTimer() {
  clearTimeout(noQrTimer);
  if (!isScanning) return;
  noQrTimer = setTimeout(()=>{
    if (isScanning) showToast('📷 No QR code visible — adjust camera', 'warning');
    resetNoQrTimer();
  }, 7000);
}

/* ── Toggle Scan ── */
function toggleScan() {
  if (!isScanning) startScan(); else stopScan();
}

function startScan() {
  const btn   = document.getElementById('scanBtn');
  const label = document.getElementById('scanBtnLabel');
  const hint  = document.getElementById('hintText');

  btn.disabled = true;
  label.textContent = 'Starting…';
  document.getElementById('statusText').textContent = 'Starting camera…';

  scanner.start(
    { facingMode:'environment' },
    {
      fps: 10,
      qrbox: function(w, h){
        const edge = Math.min(w, h);
        return { width: Math.floor(edge * 0.72), height: Math.floor(edge * 0.72) };
      },
      aspectRatio: 1.0,
      disableFlip: false,
      experimentalFeatures:{ useBarCodeDetectorIfSupported:true }
    },
    onScanSuccess,
    onScanError
  )
  .then(()=>{
    isScanning = true;
    btn.disabled = false;
    btn.classList.add('active');
    label.textContent = 'Stop Scan';
    btn.querySelector('.btn-icon').textContent = '◼';
    hint.textContent = 'Align QR code within the frame';
    document.getElementById('statusText').textContent = 'Scanning…';
    document.querySelector('.viewfinder-box').classList.add('scanning');
    resetNoQrTimer();
  })
  .catch(err=>{
    btn.disabled = false;
    label.textContent = 'Start Scan';
    btn.querySelector('.btn-icon').textContent = '⬡';
    document.getElementById('loadingOverlay').classList.add('hidden');
    const errStr = String(err);
    if (errStr.includes('NotAllowedError') || errStr.includes('ermission')) {
      document.getElementById('cameraErrorState').classList.remove('hidden');
    } else {
      showToast('❌ Camera error — please refresh', 'error');
      document.getElementById('statusText').textContent = 'Camera Error';
    }
  });
}

function stopScan() {
  clearTimeout(noQrTimer);
  const btn   = document.getElementById('scanBtn');
  const label = document.getElementById('scanBtnLabel');
  btn.disabled = true;

  scanner.stop().then(()=>{
    isScanning = false;
    scanCooldown = false;
    btn.disabled = false;
    btn.classList.remove('active');
    label.textContent = 'Start Scan';
    btn.querySelector('.btn-icon').textContent = '⬡';
    document.getElementById('hintText').textContent = 'Press Start Scan to activate the camera';
    document.getElementById('statusText').textContent = 'Idle';
    document.querySelector('.viewfinder-box').classList.remove('scanning');
  }).catch(()=>{ btn.disabled = false; });
}

/* ── Logs Strip ── */
const logsStrip = document.getElementById('logsStrip');

function prependLog(log) {
  const ts  = log.timestamp || log.scannedAt;
  const t   = ts ? new Date(ts).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false}) : '--';
  const pill = document.createElement('div');
  pill.className = 'log-pill';
  pill.innerHTML =
    '<span style="font-weight:700">' + (log.name||'?') + '</span>'
    + '<span class="badge ' + (log.status||'').toLowerCase() + '" style="font-size:0.6rem;padding:0.1rem 0.4rem;">' + (log.status||'') + '</span>'
    + '<span class="mono" style="color:var(--muted);font-size:0.72rem;">' + t + '</span>';
  // Remove placeholder text on first real log
  const placeholder = logsStrip.querySelector('span');
  if (placeholder) placeholder.remove();
  logsStrip.prepend(pill);
}

function fetchLogs() {
  jsonp(API_URL + '?action=logs', function(err, data){
    if (err || !data || !data.logs || !data.logs.length) return;
    logsStrip.innerHTML = '';
    data.logs.slice().reverse().forEach(prependLog);
  });
}

/* ── Init ── */
window.addEventListener('load', function(){
  if (typeof Html5Qrcode === 'undefined') {
    document.getElementById('loadingOverlay').classList.add('hidden');
    const e = document.getElementById('cameraErrorState');
    e.classList.remove('hidden');
    e.querySelector('h2').textContent = 'Scanner failed to load';
    e.querySelector('p').textContent  = 'Please refresh the page.';
    return;
  }

  scanner = new Html5Qrcode('viewfinder-container');
  document.getElementById('loadingOverlay').classList.add('hidden');

  fetchLogs();
  setInterval(fetchLogs, 8000);
});
</script>
</body>
</html>
