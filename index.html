<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="description" content="Antbox Digital ID Scanner">
  <title>Antbox Scanner</title>
  <!-- jsQR: pure-JS, no workers, no WASM, highly accurate -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap');

:root {
  --bg:      #08080f;
  --surface: #111119;
  --sf2:     #1a1a24;
  --border:  rgba(255,255,255,0.07);
  --primary: #7B61FF;
  --green:   #2DD4BF;
  --amber:   #FBBF24;
  --red:     #F87171;
  --text:    #EEEEFF;
  --muted:   #6B6B8A;
  --mono:    'DM Mono', monospace;
  --head:    'Syne', sans-serif;
  --spring:  cubic-bezier(0.34,1.56,0.64,1);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);color:var(--text);font-family:var(--head);
  min-height:100dvh;display:flex;flex-direction:column;overflow-x:hidden;
}

/* ── Top bar ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:0.4rem;padding:0.8rem 1rem;flex-shrink:0;
  border-bottom:1px solid var(--border);
}
.brand{font-weight:800;font-size:1.05rem;}
.brand span{color:var(--primary);}
#clock{font-family:var(--mono);font-size:0.72rem;color:var(--muted);display:none;}
@media(min-width:400px){#clock{display:block;}}
.status{display:flex;align-items:center;gap:0.4rem;font-size:0.78rem;font-weight:700;}
.dot{
  width:9px;height:9px;border-radius:50%;background:var(--green);flex-shrink:0;
  animation:pulse 2s infinite;
}
.dot.red{background:var(--red);animation:none;}
.dot.amber{background:var(--amber);animation:none;}

/* ── Scanner wrap ── */
.wrap{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:1rem;gap:0.9rem;
}

/* ── Viewfinder ── */
.vf{
  width:min(78vw,300px);aspect-ratio:1/1;position:relative;
  background:repeating-linear-gradient(
    0deg,var(--border) 0,var(--border) 1px,transparent 1px,transparent 20px),
  repeating-linear-gradient(
    90deg,var(--border) 0,var(--border) 1px,transparent 1px,transparent 20px);
  border-radius:6px;overflow:hidden;flex-shrink:0;
}
.vf video{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;z-index:1;
}
.vf canvas{display:none;}/* hidden capture canvas */
.corner{
  position:absolute;width:34px;height:34px;
  border-color:var(--primary);border-style:solid;z-index:3;
  animation:blink 2s infinite alternate;
}
.corner.tl{top:0;left:0;border-width:4px 0 0 4px;border-top-left-radius:8px;}
.corner.tr{top:0;right:0;border-width:4px 4px 0 0;border-top-right-radius:8px;}
.corner.bl{bottom:0;left:0;border-width:0 0 4px 4px;border-bottom-left-radius:8px;}
.corner.br{bottom:0;right:0;border-width:0 4px 4px 0;border-bottom-right-radius:8px;}
.sline{
  position:absolute;top:0;left:0;width:100%;height:2px;z-index:2;
  background:var(--primary);box-shadow:0 0 10px var(--primary);
  display:none;animation:sweep 2s linear infinite;
}
.scanning .sline{display:block;}

/* ── Hint ── */
.hint{color:var(--muted);font-size:0.83rem;text-align:center;}

/* ── Scan button ── */
.sbtn{
  display:flex;align-items:center;justify-content:center;gap:0.5rem;
  width:min(280px,82vw);padding:0.85rem 1.4rem;
  background:var(--primary);color:#fff;border:none;
  border-radius:12px;font-family:var(--head);font-size:1rem;
  font-weight:700;cursor:pointer;transition:all 0.2s;
}
.sbtn:hover:not(:disabled){box-shadow:0 0 20px rgba(123,97,255,0.45);}
.sbtn:active:not(:disabled){transform:scale(0.97);}
.sbtn:disabled{opacity:0.5;cursor:not-allowed;}
.sbtn.stop{background:#3a3060;}

/* ── Result card ── */
.card{
  width:min(360px,90vw);background:var(--surface);border:1px solid var(--border);
  padding:1.1rem;border-radius:14px;opacity:0;transform:translateY(20px);
  transition:all 0.4s var(--spring);pointer-events:none;
}
.card.show{opacity:1;transform:translateY(0);pointer-events:auto;}
.card.in   {background:rgba(45,212,191,.08);border-color:var(--green);}
.card.out  {background:rgba(251,191,36,.08); border-color:var(--amber);}
.card.bad  {background:rgba(248,113,113,.08);border-color:var(--red);}
.crow{display:flex;justify-content:space-between;align-items:flex-start;}
.cname{font-size:1.15rem;font-weight:700;margin-bottom:0.15rem;}
.crole{color:var(--muted);font-size:0.8rem;}
.cmeta{margin-top:0.7rem;padding-top:0.7rem;border-top:1px solid var(--border);}
.cid  {font-family:var(--mono);color:var(--primary);font-size:0.82rem;margin-bottom:0.2rem;}
.ctime{font-family:var(--mono);color:var(--muted);font-size:0.75rem;}

/* ── Badge ── */
.badge{padding:0.2rem 0.55rem;border-radius:10px;font-size:0.75rem;font-weight:800;white-space:nowrap;}
.badge.in{background:rgba(45,212,191,.2);color:var(--green);}
.badge.out{background:rgba(251,191,36,.2);color:var(--amber);}
.badge.invalid,.badge.bad{background:rgba(248,113,113,.2);color:var(--red);}
.badge.duplicate{background:rgba(251,191,36,.2);color:var(--amber);}

/* ── Back link ── */
.back{color:var(--muted);font-size:0.78rem;text-decoration:none;}
.back:hover{color:var(--text);}

/* ── Logs strip ── */
.logs{
  width:100%;flex-shrink:0;min-height:55px;max-height:66px;
  background:var(--sf2);border-top:1px solid var(--border);
  display:flex;align-items:center;padding:0 0.8rem;
  gap:0.6rem;overflow-x:auto;scrollbar-width:none;
}
.logs::-webkit-scrollbar{display:none;}
.pill{
  background:var(--surface);border:1px solid var(--border);
  padding:0.35rem 0.7rem;border-radius:18px;display:flex;
  align-items:center;gap:0.35rem;white-space:nowrap;font-size:0.8rem;flex-shrink:0;
}

/* ── Toast ── */
.toast{
  position:fixed;top:14px;left:50%;
  transform:translateX(-50%) translateY(-20px);
  padding:0.7rem 1.1rem;border-radius:10px;color:#fff;
  font-family:var(--head);font-weight:700;font-size:0.88rem;
  opacity:0;transition:all 0.28s;z-index:999;
  pointer-events:none;max-width:90vw;text-align:center;
  box-shadow:0 4px 18px rgba(0,0,0,.4);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok {background:var(--green);color:#000;}
.toast.warn{background:var(--amber);color:#000;}
.toast.err {background:var(--red);}
.toast.info{background:var(--primary);}

/* ── Error screen ── */
#errScreen{
  display:none;position:fixed;inset:0;background:var(--bg);
  flex-direction:column;align-items:center;justify-content:center;
  z-index:200;gap:1rem;text-align:center;padding:2rem;
}
#errScreen.show{display:flex;}
.eicon{
  width:54px;height:54px;border:2px solid var(--red);border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  color:var(--red);font-size:2rem;font-weight:700;
}
.retry{
  padding:0.7rem 2rem;background:var(--primary);color:#fff;border:none;
  border-radius:10px;font-family:var(--head);font-size:1rem;
  font-weight:700;cursor:pointer;
}

/* ── Admin ── */
.admin{
  position:fixed;top:0.5rem;right:0.8rem;z-index:300;
  color:var(--muted);font-size:0.72rem;text-decoration:none;opacity:0.4;
}

/* ── Keyframes ── */
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(45,212,191,.7)}70%{box-shadow:0 0 0 8px rgba(45,212,191,0)}100%{box-shadow:0 0 0 0 rgba(45,212,191,0)}}
@keyframes blink{from{opacity:.55}to{opacity:1}}
@keyframes sweep{0%{top:0;opacity:0}10%{opacity:1}90%{opacity:1}100%{top:100%;opacity:0}}
  </style>
</head>
<body>

<a class="admin" target="_blank"
   href="https://script.google.com/macros/s/AKfycbxkQXq5BDQ3xsCiPHQxSHfRtG2Vz0lJ3U8RFkAwtCWgMIqZnpVgmeb6dSs2UwrsUuii7w/exec?action=admin">Admin ↗</a>

<!-- Camera error screen -->
<div id="errScreen">
  <div class="eicon">!</div>
  <h2 id="errTitle">Camera Access Required</h2>
  <p id="errMsg" style="color:var(--muted);margin-bottom:1rem;">Allow camera access to use the scanner.</p>
  <button class="retry" onclick="location.reload()">Retry</button>
</div>

<!-- Top bar -->
<div class="topbar">
  <div class="brand">Antbox<span>ID</span></div>
  <div id="clock">--</div>
  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="statusTxt">Ready</span>
  </div>
</div>

<!-- Scanner area -->
<div class="wrap">

  <!-- Viewfinder: we own the <video>, jsQR reads frames via <canvas> -->
  <div class="vf" id="vf">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="cvs"></canvas>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="sline"></div>
  </div>

  <p class="hint" id="hint">Press <strong>Start Scan</strong> to activate camera</p>

  <button class="sbtn" id="sbtn" onclick="toggleScan()">
    <span id="sbtnIcon">⬡</span>
    <span id="sbtnLbl">Start Scan</span>
  </button>

  <!-- Result card -->
  <div class="card" id="card">
    <div class="crow">
      <div>
        <div class="cname" id="cname">--</div>
        <div class="crole" id="crole">--</div>
      </div>
      <span class="badge" id="cbadge">--</span>
    </div>
    <div class="cmeta">
      <div class="cid"   id="cid">--</div>
      <div class="ctime" id="ctime">--</div>
    </div>
  </div>

  <a class="back" href="https://script.google.com/macros/s/AKfycbxkQXq5BDQ3xsCiPHQxSHfRtG2Vz0lJ3U8RFkAwtCWgMIqZnpVgmeb6dSs2UwrsUuii7w/exec">← Back to Register</a>

</div>

<!-- Logs strip -->
<div class="logs" id="logs">
  <span style="color:var(--muted);font-size:0.78rem;flex-shrink:0;">Recent scans appear here</span>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* ─────────────────────────────────────────
   CONFIG
───────────────────────────────────────── */
const API_URL = 'https://script.google.com/macros/s/AKfycbxkQXq5BDQ3xsCiPHQxSHfRtG2Vz0lJ3U8RFkAwtCWgMIqZnpVgmeb6dSs2UwrsUuii7w/exec';

/* ─────────────────────────────────────────
   STATE
───────────────────────────────────────── */
let stream       = null;  // MediaStream
let rafId        = null;  // requestAnimationFrame id
let isScanning   = false;
let cooldown     = false;
let noQrTimer    = null;
let cardTimer    = null;

const video  = document.getElementById('video');
const cvs    = document.getElementById('cvs');
const ctx    = cvs.getContext('2d', { willReadFrequently: true });

/* ─────────────────────────────────────────
   CLOCK
───────────────────────────────────────── */
(function tick(){
  const n = new Date();
  document.getElementById('clock').textContent =
    n.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'})
    + ' · ' + n.toTimeString().slice(0,8);
  setTimeout(tick, 1000);
})();

/* ─────────────────────────────────────────
   TOAST
───────────────────────────────────────── */
const toastEl = document.getElementById('toast');
let toastTmr;
function showToast(msg, type) {
  clearTimeout(toastTmr);
  toastEl.textContent = msg;
  toastEl.className   = 'toast show ' + (type || 'info');
  toastTmr = setTimeout(() => toastEl.classList.remove('show'), 3200);
}

/* ─────────────────────────────────────────
   RESULT CARD
───────────────────────────────────────── */
const card = document.getElementById('card');
function showCard(status, data) {
  const s = status.toLowerCase();
  document.getElementById('cname').textContent = data.name   || (s==='invalid' ? data.message||'Error' : 'Unknown');
  document.getElementById('crole').textContent = data.role   || (s==='invalid' ? '' : 'N/A');
  document.getElementById('cid').textContent   = data.userId || '';
  const ts = data.timestamp || data.scannedAt;
  document.getElementById('ctime').textContent = ts ? new Date(ts).toLocaleTimeString() : '--';
  const b = document.getElementById('cbadge');
  b.textContent = status;
  b.className   = 'badge ' + s;
  card.className = 'card show ' + (s==='in'?'in': s==='out'?'out':'bad');
  clearTimeout(cardTimer);
  cardTimer = setTimeout(() => { card.className = 'card'; }, 4500);
}

/* ─────────────────────────────────────────
   JSONP  (same as before — backend unchanged)
───────────────────────────────────────── */
function jsonp(url, cb) {
  const name = 'jcb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
  const s    = document.createElement('script');
  let done   = false;
  window[name] = (data) => {
    if (done) return; done = true;
    clearTimeout(t); s.remove(); delete window[name]; cb(null, data);
  };
  const t = setTimeout(() => {
    if (done) return; done = true;
    s.remove(); delete window[name]; cb(new Error('timeout'));
  }, 9000);
  s.onerror = () => {
    if (done) return; done = true;
    clearTimeout(t); s.remove(); delete window[name]; cb(new Error('load error'));
  };
  s.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + name;
  document.head.appendChild(s);
}

/* ─────────────────────────────────────────
   SEND TO BACKEND  (unchanged payload)
───────────────────────────────────────── */
function sendToBackend(p) {
  const url = API_URL
    + '?action=scan'
    + '&userId=' + encodeURIComponent(p.userId)
    + '&name='   + encodeURIComponent(p.name   || '')
    + '&role='   + encodeURIComponent(p.role   || '')
    + '&issued=' + encodeURIComponent(p.issued || '');

  jsonp(url, (err, data) => {
    if (err) {
      showToast('⚠️ Server error — check connection', 'err');
      showCard('INVALID', { message: 'Server Error' });
      cooldown = false;
      return;
    }
    const st = (data.status || '').toUpperCase();
    if (st === 'DUPLICATE') {
      showToast('⚠️ Already logged — duplicate scan', 'warn');
      setTimeout(() => { cooldown = false; }, 2500);
    } else if (st === 'INVALID') {
      showToast('❌ ' + (data.message || 'Invalid QR'), 'err');
      showCard('INVALID', { message: data.message });
      cooldown = false;
    } else {
      const time = new Date(data.scannedAt || Date.now()).toLocaleTimeString();
      showToast('✅ ' + st + ' logged at ' + time, 'ok');
      showCard(st, data);
      prependLog(data);
      cooldown = false;
    }
  });
}

/* ─────────────────────────────────────────
   QR SCAN LOOP  (jsQR on canvas frames)
───────────────────────────────────────── */
function scanFrame() {
  if (!isScanning) return;

  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    cvs.width  = video.videoWidth;
    cvs.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);

    const img  = ctx.getImageData(0, 0, cvs.width, cvs.height);
    const code = jsQR(img.data, img.width, img.height, {
      inversionAttempts: 'dontInvert'
    });

    if (code) {
      resetNoQrTimer(); // got something — reset warning timer
      if (!cooldown) handleQR(code.data);
    }
  }

  rafId = requestAnimationFrame(scanFrame);
}

function handleQR(raw) {
  const trimmed = raw.trim();
  console.log("Raw QR Data:", trimmed);
  try {
    const p = JSON.parse(trimmed);
    if (!p.userId) {
      showToast('❌ Missing userId in QR', 'err');
      return;
    }
    cooldown = true;
    showToast('QR detected — sending…', 'info');
    sendToBackend(p);
  } catch(e) {
    console.error("JSON Parse Error:", e, "Content:", trimmed);
    showToast('❌ QR is not valid JSON', 'err');
  }
}

/* ─────────────────────────────────────────
   NO-QR TIMER
───────────────────────────────────────── */
function resetNoQrTimer() {
  clearTimeout(noQrTimer);
  if (!isScanning) return;
  noQrTimer = setTimeout(() => {
    if (isScanning) showToast('📷 No QR visible — adjust camera', 'warn');
    resetNoQrTimer();
  }, 7000);
}

/* ─────────────────────────────────────────
   START / STOP
───────────────────────────────────────── */
function setUI(scanning) {
  document.getElementById('sbtn').classList.toggle('stop', scanning);
  document.getElementById('sbtnIcon').textContent = scanning ? '◼' : '⬡';
  document.getElementById('sbtnLbl').textContent  = scanning ? 'Stop Scan' : 'Start Scan';
  document.getElementById('hint').innerHTML       = scanning
    ? 'Align QR code within the frame'
    : 'Press <strong>Start Scan</strong> to activate camera';
  document.getElementById('statusTxt').textContent = scanning ? 'Scanning…' : 'Idle';
  const dot = document.getElementById('dot');
  dot.className = 'dot' + (scanning ? '' : ' amber');
  document.getElementById('vf').classList.toggle('scanning', scanning);
}

async function startScan() {
  const btn = document.getElementById('sbtn');
  btn.disabled = true;
  document.getElementById('sbtnLbl').textContent = 'Starting…';

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width:  { ideal: 1280 },
        height: { ideal: 720 }
      },
      audio: false
    });
    video.srcObject = stream;
    await video.play();

    isScanning = true;
    btn.disabled = false;
    setUI(true);
    resetNoQrTimer();
    scanFrame();

  } catch(err) {
    btn.disabled = false;
    document.getElementById('sbtnLbl').textContent = 'Start Scan';
    const s = String(err);
    if (s.includes('NotAllowedError') || s.includes('ermission')) {
      document.getElementById('errScreen').classList.add('show');
    } else if (s.includes('NotFoundError')) {
      showToast('❌ No camera found on this device', 'err');
    } else {
      showToast('❌ Camera error — ' + err.name, 'err');
    }
  }
}

function stopScan() {
  isScanning = false;
  cooldown   = false;
  clearTimeout(noQrTimer);
  cancelAnimationFrame(rafId);

  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
  video.srcObject = null;

  document.getElementById('sbtn').disabled = false;
  setUI(false);
}

function toggleScan() {
  if (isScanning) stopScan(); else startScan();
}

/* ─────────────────────────────────────────
   LOGS STRIP
───────────────────────────────────────── */
const logsEl = document.getElementById('logs');

function prependLog(log) {
  const ts   = log.timestamp || log.scannedAt;
  const time = ts ? new Date(ts).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false}) : '--';
  const pill = document.createElement('div');
  pill.className = 'pill';
  pill.innerHTML =
    '<span style="font-weight:700">' + (log.name||'?') + '</span>'
    + '<span class="badge '+(log.status||'').toLowerCase()+'" style="font-size:.6rem;padding:.1rem .4rem">'+(log.status||'')+'</span>'
    + '<span style="font-family:var(--mono);color:var(--muted);font-size:.72rem">'+time+'</span>';
  const ph = logsEl.querySelector('span');
  if (ph) ph.remove();
  logsEl.prepend(pill);
}

function fetchLogs() {
  jsonp(API_URL + '?action=logs', (err, data) => {
    if (err || !data?.logs?.length) return;
    logsEl.innerHTML = '';
    data.logs.slice().reverse().forEach(prependLog);
  });
}

fetchLogs();
setInterval(fetchLogs, 8000);

/* ─────────────────────────────────────────
   GUARD: jsQR must be loaded
───────────────────────────────────────── */
window.addEventListener('load', () => {
  if (typeof jsQR === 'undefined') {
    document.getElementById('errTitle').textContent = 'Scanner failed to load';
    document.getElementById('errMsg').textContent   = 'Check your internet connection and refresh.';
    document.getElementById('errScreen').classList.add('show');
  }
});
</script>
</body>
</html>
